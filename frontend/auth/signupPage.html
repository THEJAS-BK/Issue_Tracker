<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus issue Tracker</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./signupPage.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Mono:ital,wght@0,200..800;1,200..800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/global.css">
  </head>
  <body>
         <!-- GLOBAL TOAST ROOT -->
  <div id="toast-container"></div>
    <div class="page-loader">
  <div class="loader-content">
    <div class="spinner"></div>
    <p class="spinner-content">Loading...</p>
  </div>
</div>
    <div class="signUpContainer">
      <header>
        <p>Issue Tracker</p>
      </header>
      <main>
        <h3>Create Account</h3>
        <form id="signUpForm">
          <div class="contents">
            <div class="inpField">
            <label for="signupname">  <i class="fa-solid fa-user"></i></label>
              <span></span>
              <input type="text" name="name" placeholder="Name" id="signupname" required />
            </div>
            <div class="inpField">
              <label for="signupemail"><i class="fa-solid fa-envelope"></i></label>
              <span></span>
              <input type="email" name="email" placeholder="Email" id="signupemail" required />
            </div>
            <div class="inpField">
              <label for="signuppassword"><i class="fa-solid fa-lock"></i></label>
              <span></span>
              <input
                type="password"
                placeholder="Password"
                name="password"
                id="signuppassword"
                required
              />
              <input
                type="checkbox"
                id="togglePassword"
                style="display: none"
              />
              <label for="togglePassword"
                ><i class="fa-solid fa-eye"></i
              ></label>
            </div>
          </div>
          <button class="signupBtn">Sign Up</button>
        </form>
        <p>Already have an account? <a href="../index.html">Login</a></p>
      </main>
    </div>
  </body>
  <script type="module" src="./auth.js"></script>
</html>
