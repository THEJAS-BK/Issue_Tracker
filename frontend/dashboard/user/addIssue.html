<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      crossorigin="anonymous"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./addIssue.css" />
  </head>
  <body>
    <div class="page-loader">
      <div class="loader-content">
        <div class="spinner"></div>
        <p>Loading...</p>
      </div>
    </div>
    <header>
      <h2>Add Issue</h2>
      <div class="right-section">
        <a id="home" href="/dashboard/user/userpage.html">Home</a>
        <button class="username">
          <span class="get-user-name">Thejas BK</span>
          <i class="fa-solid fa-angle-down"></i>
        </button>
        <div class="dropdown-user hidden">
          <button
            class="home-btn"
            onclick="window.location.pathname = '/dashboard/user/userpage.html'"
          >
            Home
          </button>
          <button class="logout-btn">Logout</button>
        </div>
      </div>
    </header>
    <main class="d-flex justify-content-center">
      <div class="main-content">
        <h2 class="">Add New Issue</h2>
        <p class="title-desc">Report an issue related to your group</p>
        <hr />
        <form class="issue-form needs-validation" novalidate>
          <div class="mb-1 position-relative">
            <label class="form-label" for="title">Issue Title</label>
            <input
              type="text"
              class="form-control"
              placeholder="e.g. Bus AC not working"
              name="title"
              id="title"
              maxlength="30"
              required
            />
            <div class="invalid-tooltip">
              Please enter a title for the issue.
            </div>
          </div>
          <div class="upload mt-3" id="uploadBox">
            <input
              type="file"
              name="issue-image"
              id="issue-image"
              hidden
              accept="image/*"
            />
            <label for="issue-image" id="issue-image-label">
              <i class="fa-solid fa-cloud-arrow-up remove-this"></i>
              <p class="remove-this">Click or drag and drop issue image</p>
              <img src="" alt="" class="issueImg" />
            </label>
          </div>

          <div class="mt-2 position-relative">
            <label class="form-label">Description</label>
            <textarea
              rows="4"
              class="form-control"
              placeholder="Describe the issue in detail..."
              name="description"
              required
            ></textarea>
            <div class="invalid-tooltip">
              description is required
            </div>
          </div>

          <div class="form-check form-switch mt-2">
            <input
              class="form-check-input mt-2"
              type="checkbox"
              id="anonymousSwitch"
            />
            <label class="form-check-label" for="anonymousSwitch">
              Stay anonymous
            </label>
          </div>

          <div class="buttons d-flex gap-2 justify-content-center">
            <button type="button" class="btn btn-danger cancel-btn">
              Cancel
            </button>
            <button type="submit" class="btn btn-primary">Add Issue</button>
          </div>
        </form>
      </div>
    </main>
  </body>
  <script type="module" src="./addIssue.js"></script>
</html>
