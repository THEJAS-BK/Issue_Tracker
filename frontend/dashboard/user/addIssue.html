    />

              <p>J</p>

          </div>

          <label for="menu-toggle">

        </div>

        <a href="/frontend/dashboard/user/userpage.html">home</a>

    <nav>
      <label for="menu-toggle">
        <i class="fa-solid fa-bars"></i>
      </label>
      <h2>Issue Tracker</h2>
      <div class="headAcc">
        <div>
          <p>J</p>
        </div>
        <i class="fa-solid fa-angle-down"></i>
      </div>
    </nav>

    <div class="page">
      <h2>Add New Issue</h2>
      <p class="subtitle">report query related to issue</p>

      <form class="issue-form">
        <div class="form-group">
          <label>Issue Title</label>
          <input
            type="text"
            placeholder="e.g. Bus AC not working"
            name="title"
            required
          />
        </div>
        
        <div class="form-group">
          <label for="file">Upload image</label>
          <input type="file" name="file" id="file" hidden>
          <label for="file" class="upload-area"></label>
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea
            rows="4"
            placeholder="Describe the issue in detail..."
            name="description"
            required
          ></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Category</label>
            <select class="category" name="category">
              <option value="Infrastructure">Infrastructure</option>
              <option value="Transport">Transport</option>
              <option value="IT&Wifi">IT&wifi</option>
              <option value="Hostel/mess">Hostel/mess</option>
              <option value="Academics">Academics</option>
              <option value="others">others</option>
            </select>
          </div>

          <div class="form-group">
            <label>Priority</label>
            <select name="priority" class="priority">
              <option value="2">Low</option>
              <option value="3">Medium</option>
              <option value="4">High</option>
            </select>
          </div>
        </div>

        <div class="buttons">
          <button type="button" class="cancel">Cancel</button>
          <button type="submit" class="submit">Add Issue</button>
        </div>
      </form>
    </div>
  </body>
  <script type="module" src="addIssue.js"></script>
</html>
