<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Add Issue</title>
    <link rel="stylesheet" href="addIssue.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <nav>
      <i class="fa-solid fa-bars"></i>
      <h2>Issue Tracker</h2>
      <div class="headAcc">
        <div>
          <p>J</p>
        </div>
        <i class="fa-solid fa-angle-down"></i>
      </div>
    </nav>

    <div class="page">
      <h2>Add New Issue</h2>
      <p class="subtitle">Report an issue to your community group</p>

      <form class="issue-form">
        <div class="form-group">
          <label>Issue Title</label>
          <input type="text" placeholder="e.g. Bus AC not working" name="title" required />
        </div>

        <div class="form-group" >
          <label>Description</label>
          <textarea
            rows="4"
            placeholder="Describe the issue in detail..."
            name="description"
            required
          ></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Category</label>
            <select class="category" name="category">
              <option value="1">Bus Timing</option>
              <option value="2">Bus Condition</option>
              <option value="3">Driver Behavior</option>
              <option value="4">Route Issue</option>
            </select>
          </div>

          <div class="form-group">
            <label>Priority</label>
            <select name="priority" class="priority">
              <option value="2">Low</option>
              <option value="3">Medium</option>
              <option value="4">High</option>
            </select>
          </div>
        </div>

        <div class="buttons">
          <button type="button" class="cancel">Cancel</button>
          <button type="submit" class="submit">Add Issue</button>
        </div>
      </form>
    </div>
  </body>
  <script src="addIssue.js"></script>
</html>
