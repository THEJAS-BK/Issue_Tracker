    <meta charset="UTF-8" />

      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../hambugerMenu.css" />
  </head>
  <body>
    <input type="checkbox" id="menu-toggle" hidden />
    <div class="menu">
      <div class="menu-top">
        <div class="menu-profile">
          <div class="headAcc head-width">
            <div>
              <p>J</p>
            </div>
            <h3>Jhon Doe</h3>
          </div>
        </div>
        <div class="close-btn">
          <label for="menu-toggle">
            <i class="fa-solid fa-xmark"></i>
          </label>
        </div>
      </div>
      <div class="menu-links">
        <a href="/frontend/dashboard/user/userpage.html">home</a>
        <a href="/frontend/dashboard/user/addIssue.html">add Issue</a>
        <a href="/frontend/dashboard/user/creategroup.html">create group</a>
        <a href="/frontend/dashboard/user/groupInterface.html"
          >group Interface</a
        >
        <a href="/frontend/dashboard/admin/adminPage.html">admin page</a>
        <a href="/frontend/dashboard/user/#">Join group</a>
        <a href="/frontend/dashboard/user/#">Settings</a>
        <a href="/frontend/dashboard/user/#">Logout</a>
      </div>
    </div>
    <nav>
      <label for="menu-toggle">
        <i class="fa-solid fa-bars"></i>
      </label>
      <h2>Issue Tracker</h2>
      <div class="headAcc">
        <div>
          <p>J</p>
        </div>
        <i class="fa-solid fa-angle-down"></i>
      </div>
    </nav>

    <div class="page">
      <h2>Add New Issue</h2>
      <p class="subtitle">report query related to issue</p>

      <form class="issue-form">
        <div class="form-group">
          <label>Issue Title</label>
          <input
            type="text"
            placeholder="e.g. Bus AC not working"
            name="title"
            required
          />
        </div>

        <div class="form-group">
          <input type="file" name="file" id="file" hidden />
          <label for="file" class="upload-area"></label>
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea
            rows="4"
            placeholder="Describe the issue in detail..."
            name="description"
            required
          ></textarea>
        </div>

        <div class="form-row">
          <div class="form-check form-switch">
            <input
              class="form-check-input"
              type="checkbox"
              id="anonymousSwitch"
            />
            <label class="form-check-label" for="anonymousSwitch">
              Stay anonymous
            </label>
            <span class="info-anonymous">
              <i class="fa-solid fa-circle-info"></i>
              <div class="info-container">
                <p>When enabled, your name will only be visible to admins.</p>
              </div>
            </span>
          </div>
        </div>

        <div class="buttons">
          <button type="button" class="cancel">Cancel</button>
          <button type="submit" class="submit">Add Issue</button>
        </div>
      </form>
    </div>
  </body>
  <script type="module" src="addIssue.js"></script>
</html>
