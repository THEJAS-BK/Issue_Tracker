<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus issue Tracker</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="./creategroup.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Mono:ital,wght@0,200..800;1,200..800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header>
      <h2>Create Group</h2>
      <div class="right-section">
        <a id="home" href="/dashboard/user/userpage.html">Home</a>
        <button class="username">
          <span class="get-user-name">Thejas BK</span>
          <i class="fa-solid fa-angle-down"></i>
        </button>
        <div class="dropdown-user hidden">
          <button class="home-btn" onclick="window.location.pathname='/dashboard/user/userpage.html'">Home</button>
        </div>
      </div>
    </header>

    <main class="d-flex justify-content-center">
      <div class="main-content mt-5 p-4">
        <h2>Create Groups</h2>
        <p>Create a group to manage and track Community issues</p>
        <hr />
        <form id="create-group-form">
          <div class="mb-2">
            <label for="exampleFormControlInput1" class="form-label"
              >Group Name</label
            >
            <input
              class="form-control"
              id="exampleFormControlInput1"
              placeholder="Eg: library group"
              name="groupname"
            />
          </div>
          <div>
            <label for="exampleFormControlTextarea1" class="form-label"
              >Description</label
            >
            <textarea
              class="form-control"
              id="exampleFormControlTextarea1"
              rows="3"
              name="description"
            ></textarea>
          </div>
          <div class="bottom-section">
            <div class="upload" id="uploadBox">
              <input
                type="file"
                name="g roup-profile"
                id="group-profile"
                hidden
                accept="image/*" 
              />
              <label for="group-profile" id="group-profile-label">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <p>Click or drag and drop group profile </p>
              </label>
            </div>
            <div class="selectGroup">
              <div class="joinapproval">
                <label for="join-approval" class="form-label"
                  >Join approval</label
                >
                <select
                  name="joinapproval"
                  class="form-select"
                  id="join-approval"
                  aria-label="Default select example"
                >
                  <option selected value="open">open</option>
                  <option value="request">required</option>
                </select>
              </div>
              <div class="imageupload">
                <label for="image-upload" class="form-label">
                  Image upload permission
                </label>
                <select
                  name="imageuploadpermission"
                  id="image-upload"
                  class="form-select"
                >
                  <option value="allowed">allowed</option>
                  <option value="notallowed">not allowed</option>
                </select>
                <div class="buttons">
                  <button type="submit" class="btn btn-primary">
                    create group
                  </button>
                  <button class="btn btn-danger" onclick="window.location.pathname='/dashboard/user/userpage.html'">cancel</button>
                </div>
              </div>
            </div>
            <br />
          </div>
        </form>
      </div>
    </main>
  </body>
  <script type="module" src="./creategroup.js"></script>
</html>
