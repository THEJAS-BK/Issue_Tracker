<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus issue Tracker</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="creategroup.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Mono:ital,wght@0,200..800;1,200..800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <nav>
      <i class="fa-solid fa-bars"></i>
      <h2>Issue Tracker</h2>
      <div class="headAcc">
        <div>
          <p>J</p>
        </div>
        <i class="fa-solid fa-angle-down"></i>
      </div>
    </nav>
    <main>
      <div class="main-content">
        <h2>Create Groups</h2>
        <p>Create a group to manage and track Community issues</p>
        <form id="create-group-form">
          <div class="mb-3">
            <label for="exampleFormControlInput1" class="form-label"
              >Group Name</label
            >
            <input
              type="email"
              class="form-control"
              id="exampleFormControlInput1"
              placeholder="Eg: library group"
            />
          </div>
          <div class="mb-3">
            <label for="exampleFormControlTextarea1" class="form-label"
              >Description</label
            >
            <textarea
              class="form-control"
              id="exampleFormControlTextarea1"
              rows="3"
            ></textarea>
          </div>

          <label for="select-category" class="form-label" >Category</label>
          <select
            class="form-select"
            aria-label="Default select example"
            id="select-category"
          >
            <option selected>Select category</option>
            <option value="Infrastructure">Infrastructure</option>
            <option value="Transport">Transport</option>
            <option value="IT&Wifi">IT&wifi</option>
            <option value="Hostel/mess">Hostel/mess</option>
            <option value="Academics">Academics</option>
          </select>
          <label for="visiblity" class="form-label mt-2">Visiblity</label>
          <select
            class="form-select"
            id="visiblity"
            aria-label="Default select example"
          >
            <option selected value="public">public</option>
            <option value="private">private</option>
          </select>
            <label for="join-approval" class="form-label mt-2">Join approval</label>
          <select class="form-select" id="join-approval" aria-label="Default select example">
            <option selected value="required">Required</option>
            <option value="notrequired">Not required</option>
          </select>
          <div class="btn btn-primary mt-4">Create group</div>
        </form>
      </div>
    </main>
  </body>
  <script src="/frontend/dashboard/dashboardpages.js"></script>
</html>
