<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="userpage.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Mono:ital,wght@0,200..800;1,200..800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="search-overlay">
      <div id="group-search">
        <!-- Header -->
        <div class="search-header">
          <span class="title">Search Groups</span>
          <i class="fa-solid fa-x close-joingroup-btn"></i>
        </div>

        <!-- Search input -->
        <div class="search-input-wrapper">
          <input
            type="text"
            id="searchInput"
            placeholder="Search by name or invite code"
          />
        </div>

        <div id="searchResults">
          </div>  
        </div>
      </div>
    </div>

    <header>
      <h2>Home page</h2>
      <div class="right-section">
        <button class="username">
          Thejas Bk <i class="fa-solid fa-angle-down"></i>
        </button>
        <div class="dropdown-user hidden">
          <button class="create-group-btn">Create Group</button>
        </div>
      </div>
    </header>
    <main>
      <div class="mainLeft">
        <h2>Your Groups</h2>
        <div class="left-search-bar">
         <div class="search-left">
           <input
            type="text"
            name="search"
            id="searchjoinedGroups"
            placeholder="Search groups"
          />
          <i class="fa-solid fa-x" id="clear-search"></i>
         </div>
          <button id="joinGroup">+ Join Group</button>
        </div>
        <div class="leftTab">
          <div class="space-holder"></div>
        </div>
      </div>
    </main>
  </body>
  <script type="module" src="./dashboardpages.js"></script>
</html>
