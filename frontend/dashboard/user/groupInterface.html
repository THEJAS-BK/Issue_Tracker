<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./groupInterface.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Mono:ital,wght@0,200..800;1,200..800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/global.css">
  </head>
  <body>
         <!-- GLOBAL TOAST ROOT -->
  <div id="toast-container"></div>
    <div class="page-loader">
      <div class="loader-content">
        <div class="spinner"></div>
        <p>Loading...</p>
      </div>
    </div>
    <div class="confirm-backdrop">
      <div class="confirm-modal">
        <h1>Delete item?</h1>
        <p>This action cannot be undone.</p>

        <div class="actions">
          <button class="confirm-cancel">Cancel</button>
          <button class="confirm-delete">Delete</button>
        </div>
      </div>
    </div>

    <!-- members info part  -->
    <div class="confirm-backdrop-members">
      <div class="members-tab">
        <div class="member-head">
          <h1>Members</h1>
          <i class="fa-solid fa-xmark close-members-tab"></i>
        </div>
        <div class="members-search">
          <div class="searchInp-members">
            <label for="search">
              <i class="fa-solid fa-magnifying-glass"></i>
            </label>
            <input
              type="text"
              name=""
              id="search-members"
              placeholder="Search member..."
            />
          </div>
          <select name="filter" id="filter-members">
            <option value="all">All</option>
            <option value="coadmin">coadmin</option>
            <option value="member">Member</option>
          </select>
        </div>
        <div class="member-list">
          <div class="member-tab">
            <div class="member-tab-left">
              <h4 class="member-name">Name</h4>
              <p class="joined-at">joined: 1hourago</p>
            </div>
            <p class="member-status">member</p>
          </div>
        </div>
      </div>
    </div>

    <!-- confirm member exit  -->
    <div class="confirm-backdrop-exit">
      <div class="confirm-modal-exit">
        <h1>Exit Group?</h1>
        <p>Are you sure you want to exit this group?</p>

        <div class="actions">
          <button class="confirm-exit-cancel">Cancel</button>
          <button class="confirm-exit">Exit group</button>
        </div>
      </div>
    </div>

    <header>
      <div class="left-section">
        <h2>User Dashboard</h2>
      </div>
      <div class="rightSection">
        <a class="home-btn-dashboard" href="./userpage.html">Home</a>
        <button class="username">
          <span class="get-user-name">Thejas BK</span>
          <i class="fa-solid fa-angle-down"></i>
        </button>
        <div class="dropdown-user hidden">
          <button class="admin-dashboard-btn">admin dashboard</button>
          <button id="show-members">
            members (<span class="show-total-members">90</span>)
          </button>
          <button
            class="home-btn-dashboard dropdown-home-btn"
            onclick="window.location.href = './userpage.html'"
          >
            Home
          </button>
          <button id="exit-group">exit group</button>
          <button class="logout-btn">Logout</button>
        </div>
      </div>
    </header>
    <main>
      <div class="head">
        <div class="headLeft">
          <h2 class="group-name">Bus Issue</h2>
          <div class="description-wrapper">
            <p class="group-description collapsed">
            </p>

            <button class="read-more-btn">Read more</button>
          </div>
          <p>invite code : <span class="invite-code"></span></p>
        </div>
        <button class="addIssue-btn">+ Add Issue</button>
      </div>
      <hr />
      <div class="main-content">
        <div class="mainleft">
          <div class="search">
            <div class="searchInp">
              <label for="search">
                <i class="fa-solid fa-magnifying-glass"></i>
              </label>
              <input
                type="text"
                name=""
                id="search"
                placeholder="Search Issues..."
              />
            </div>
            <select name="filer" id="search-filter">
              <option value="all">all</option>
              <option value="myIssues">My Issues</option>
              <option value="pending">pending</option>
              <option value="inprogress">In progress</option>
              <option value="resolved">resolved</option>
            </select>
          </div>
          <div class="issues"></div>
        </div>
        <div class="mainright">
          <button class="go-back-btn">go back</button>
          <div class="right-head">
            <div class="head-title">
              <h3></h3>
              <div class="issue-options">
                <i class="fa-solid fa-ellipsis get-dropdown-right"></i>
                <div class="issue-options-dropdown">
                  <button id="edit-issue">Edit</button>
                  <button id="delete-issue">Delete</button>
                </div>
              </div>
            </div>
            <div class="head-user">
              <div class="user-left">
                <p class="name"></p>
                <p class="time-ago"></p>
              </div>
              <div class="badge right-content"></div>
            </div>
          </div>
          <div class="right-description">
            <div class="description-head">
              <h3>Description</h3>
            </div>
            <div class="description-body">
              <img class="right-image hidden" src="" alt="Issue Image" />
              <hr class="desc-line hidden" />
              <p class="description-body-content"></p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
  <script type="module" src="./groupinterface.js"></script>
</html>
