<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="groupInterface.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Mono:ital,wght@0,200..800;1,200..800&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../hambugerMenu.css" />
  </head>
  <body>
    <input type="checkbox" id="menu-toggle" hidden />
    <div class="menu">
      <div class="menu-top">
        <div class="menu-profile">
          <div class="headAcc head-width">
            <div>
              <p>J</p>
            </div>
            <h3>Jhon Doe</h3>
          </div>
        </div>
        <div class="close-btn">
          <label for="menu-toggle">
            <i class="fa-solid fa-xmark"></i>
          </label>
        </div>
      </div>
      <div class="menu-links">
        <a href="/frontend/dashboard/user/userpage.html">home</a>
        <a href="/frontend/dashboard/user/addIssue.html">add Issue</a>
        <a href="/frontend/dashboard/user/creategroup.html">create group</a>
        <a href="/frontend/dashboard/user/groupInterface.html"
          >group Interface</a
        >
        <a href="/frontend/dashboard/admin/adminPage.html">admin page</a>
         <a href="/frontend/dashboard/user/editIssue.html">edit issue</a>
        <a href="/frontend/dashboard/user/#">Settings</a>
        <a href="/frontend/dashboard/user/#">Logout</a>
      </div>
    </div>

    <div class="confirm-backdrop">
      <div class="confirm-modal">
        <h1>Delete item?</h1>
        <p>This action cannot be undone.</p>

        <div class="actions">
          <button class="confirm-cancel">Cancel</button>
          <button class="confirm-delete">Delete</button>
        </div>
      </div>
    </div>

    <header>
      <div class="navleft">
        <label for="menu-toggle">
          <i class="fa-solid fa-bars"></i>
        </label>
      </div>
      <div class="mid">
        <h2>User dashboard</h2>
      </div>
      <div class="leftSection">
        <button class="admin-dashboard-btn">admin dashboard</button>
        <div class="headAcc">
          <div>
            <p>J</p>
          </div>
          <i class="fa-solid fa-angle-down"></i>
        </div>
      </div>
    </header>
    <main>
      <div class="head">
        <div class="headLeft">
          <h2 class="group-name">Bus Issue</h2>
          <p class="group-description">
            issue related to bus routes and schedules
          </p>
          <p>invite code : <span class="invite-code"></span></p>
        </div>
        <button class="addIssue-btn">+ Add Issue</button>
      </div>
      <div class="main-content">
        <div class="mainleft">
          <div class="search">
            <div class="searchInp">
              <label for="search">
                <i class="fa-solid fa-magnifying-glass"></i>
              </label>
              <input
                type="text"
                name=""
                id="search"
                placeholder="Search Issues..."
              />
            </div>
            <select name="filer" id="search-filter">
              <option value="all">all</option>
              <option value="pending">pending</option>
              <option value="inprogress">In progress</option>
              <option value="resolved">resolved</option>
            </select>
          </div>
          <div class="issues"></div>
        </div>
        <div class="mainright">
          <div class="right-head">
            <div class="head-title">
              <h3></h3>
              <div class="issue-options">
                <i class="fa-solid fa-ellipsis "></i>
                <div class="issue-options-dropdown">
                  <button id="edit-issue">Edit</button>
                  <button id="delete-issue">Delete</button>
                </div>
              </div>
            </div>
            <div class="head-user">
              <div class="user-left">
                <div class="profile">
                  <img src="/frontend/assets/OIP.jpg" alt="" />
                </div>
                <p class="name"></p>
                <p class="time-ago"></p>
              </div>
              <div class="badge"></div>
            </div>
          </div>
          <div class="right-description">
            <div class="description-head">
              <h3>Description</h3>
            </div>
            <div class="description-body">
              <img
                class="right-image"
                src="/frontend/assets/OIP.jpg"
                alt="Issue Image"
              />
              <p class="description-body-content"></p>
              <div class="sameIssues">
                <p>Facing the same issue?</p>
                <button class="upvote-btn">
                  <i class="fa-solid fa-circle-up"></i> upvote
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
  <script
    type="module"
    src="/frontend/dashboard/user/groupinterface.js"
  ></script>
</html>
