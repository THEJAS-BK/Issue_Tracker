<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Add Issue</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      crossorigin="anonymous"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="./editIssue.css" />
  </head>

  <body>
    <header>
      <h2>Edit Issue</h2>
      <div class="right-section">
        <a id="home" href="/dashboard/user/userpage.html">Home</a>
        <button class="username">
          <span class="get-user-name">user</span>
          <i class="fa-solid fa-angle-down"></i>
        </button>
        <div class="dropdown-user hidden">
          <button
            class="home-btn"
            onclick="window.location.pathname = '/dashboard/user/userpage.html'"
          >
            Home
          </button>
        </div>
      </div>
    </header>

    <main class="d-flex justify-content-center">
      <div class="main-content mt-2 p-4">
        <h2 class="mt-0">Edit Issue</h2>
        <p class="title-desc">Update an existing issue in your group</p>
        <hr />

        <form class="issue-form">
          <div class="mb-1">
            <label class="form-label" for="title">Issue Title</label>
            <input
              type="text"
              class="form-control"
              placeholder="e.g. Bus AC not working"
              name="title"
              id="title"
              required
            />
          </div>

          <div class="upload mt-3" id="uploadBox">
            <input
              type="file"
              name="issue-image"
              id="issue-image"
              hidden
              accept="image/*"
            />
            <label for="issue-image" id="issue-image-label">
              <i class="fa-solid fa-cloud-arrow-up"></i>
              <p>Click or drag and drop issue image</p>
            </label>
          </div>

          <div class="mt-2">
            <label class="form-label">Description</label>
            <textarea
              rows="4"
              class="form-control"
              placeholder="Describe the issue in detail..."
              name="description"
              id="description"
              required
            ></textarea>
          </div>

          <div class="form-check form-switch mt-2">
            <input
              class="form-check-input mt-2"
              type="checkbox"
              id="anonymousSwitch"
            />
            <label class="form-check-label" for="anonymousSwitch">
              Stay anonymous
            </label>
          </div>

          <div class="buttons d-flex gap-2 justify-content-center">
            <button type="button" class="btn btn-danger cancel-btn">Cancel</button>
            <button type="submit" class="btn btn-primary">Add Issue</button>
          </div>
        </form>
      </div>
    </main>

    <script type="module" src="editIssue.js"></script>
  </body>
</html>
